
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.app { max-width: 420px; margin: 0 auto; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; min-height: 600px; display: flex; flex-direction: column; }
.topbar { background: #3730b5; padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
.topbar-title { color: #fff; font-size: 17px; font-weight: 500; flex: 1; }
.topbar-badge { background: rgba(255,255,255,0.2); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 10px; }
.screen { flex: 1; display: none; flex-direction: column; }
.screen.active { display: flex; }
.scroll-area { flex: 1; overflow-y: auto; padding: 16px; }
.label { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; }
textarea { width: 100%; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; font-size: 14px; font-family: var(--font-sans); resize: none; background: var(--color-background-secondary); color: var(--color-text-primary); outline: none; }
textarea:focus { border-color: #3730b5; }
.situation-input { width: 100%; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; font-size: 14px; font-family: var(--font-sans); background: var(--color-background-secondary); color: var(--color-text-primary); outline: none; }
.situation-input:focus { border-color: #3730b5; }
.tone-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
.tone-chip { padding: 6px 14px; border-radius: 20px; font-size: 13px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-primary); cursor: pointer; transition: all 0.15s; }
.tone-chip.selected { background: #3730b5; color: #fff; border-color: #3730b5; }
.analyze-btn { margin: 16px; padding: 13px; background: #3730b5; color: #fff; border: none; border-radius: var(--border-radius-md); font-size: 15px; font-weight: 500; cursor: pointer; width: calc(100% - 32px); }
.analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.hint { font-size: 11px; color: var(--color-text-tertiary); text-align: center; margin-top: 4px; padding: 0 16px 12px; }
.section-head { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot-amber { background: #BA7517; }
.dot-blue { background: #185FA5; }
.dot-green { background: #3B6D11; }
.analysis-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; margin-bottom: 12px; font-size: 13px; color: var(--color-text-primary); line-height: 1.6; border: 0.5px solid var(--color-border-tertiary); }
.trigger-tag { display: inline-block; background: #FAECE7; color: #993C1D; font-size: 12px; padding: 2px 8px; border-radius: 4px; margin: 2px 3px 2px 0; }
.rewrite-card { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); margin-bottom: 10px; overflow: hidden; }
.rewrite-label { font-size: 11px; font-weight: 500; padding: 6px 12px; letter-spacing: 0.4px; text-transform: uppercase; }
.rewrite-label.softer { background: #EAF3DE; color: #3B6D11; }
.rewrite-label.clearer { background: #E6F1FB; color: #185FA5; }
.rewrite-label.firmer { background: #FAEEDA; color: #854F0B; }
.rewrite-body { padding: 10px 12px; font-size: 14px; line-height: 1.6; color: var(--color-text-primary); }
.copy-btn { margin: 6px 12px 10px; padding: 5px 12px; font-size: 12px; border: 0.5px solid var(--color-border-secondary); border-radius: 6px; background: transparent; color: var(--color-text-secondary); cursor: pointer; }
.copy-btn:hover { background: var(--color-background-secondary); }
.back-btn { background: transparent; border: none; color: #fff; font-size: 14px; cursor: pointer; padding: 0; }
.loading-wrap { flex: 1; display: flex; flex-direction: columns; align-items: center; justify-content: center; flex-direction: column; gap: 12px; padding: 40px; }
.spinner { width: 32px; height: 32px; border: 2.5px solid var(--color-border-tertiary); border-top-color: #3730b5; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--color-text-secondary); }
.original-bubble { background: #5b55d6; color: #fff; border-radius: 14px 14px 4px 14px; padding: 10px 14px; font-size: 13px; line-height: 1.5; margin-bottom: 16px; display: inline-block; max-width: 85%; float: right; clear: both; }
.bubble-wrap { overflow: hidden; margin-bottom: 16px; }
.sep { height: 0.5px; background: var(--color-border-tertiary); margin: 16px 0; }
</style>

<div class="app">
  <div class="topbar">
    <button class="back-btn" id="backBtn" style="display:none" onclick="goBack()">&#8592;</button>
    <span class="topbar-title" id="topTitle">Linea</span>
    <span class="topbar-badge" id="topBadge">+ AI</span>
  </div>

  <div class="screen active" id="inputScreen">
    <div class="scroll-area">
      <div style="margin-bottom:16px">
        <div class="label">Your draft</div>
        <textarea id="draftInput" rows="4" placeholder="Type the message you want to send...">I just don't get why you never tell me these things, it feels like you don't trust me at all</textarea>
      </div>
      <div style="margin-bottom:16px">
        <div class="label">Situation</div>
        <input class="situation-input" id="situationInput" type="text" value="Friend didn't tell me about a big life update. Feeling left out but don't want to seem clingy." placeholder="Describe the context...">
      </div>
      <div style="margin-bottom:16px">
        <div class="label">I want to sound...</div>
        <div class="tone-row" id="toneRow">
          <div class="tone-chip selected" data-tone="Softer">Softer</div>
          <div class="tone-chip" data-tone="Clearer">Clearer</div>
          <div class="tone-chip" data-tone="Firmer">Firmer</div>
          <div class="tone-chip" data-tone="More professional">More professional</div>
        </div>
      </div>
    </div>
    <div>
      <button class="analyze-btn" onclick="analyze()">Analyze message &#8594;</button>
      <div class="hint">Only your draft is analyzed — never their messages</div>
    </div>
  </div>

  <div class="screen" id="loadingScreen">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-text" id="loadingText">Reading your draft...</div>
    </div>
  </div>

  <div class="screen" id="analysisScreen">
    <div class="scroll-area" id="analysisContent"></div>
    <div style="padding: 12px 16px 16px;">
      <button class="analyze-btn" onclick="goBack()" style="background: var(--color-background-secondary); color: var(--color-text-primary); border: 0.5px solid var(--color-border-secondary);">&#8592; Analyze another message</button>
    </div>
  </div>
</div>

<script>
const toneChips = document.querySelectorAll('.tone-chip');
let selectedTone = 'Softer';
toneChips.forEach(c => {
  c.onclick = () => {
    toneChips.forEach(x => x.classList.remove('selected'));
    c.classList.add('selected');
    selectedTone = c.dataset.tone;
  };
});

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goBack() {
  showScreen('inputScreen');
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('topTitle').textContent = 'Linea';
}

async function analyze() {
  const draft = document.getElementById('draftInput').value.trim();
  const situation = document.getElementById('situationInput').value.trim();
  if (!draft) return;

  showScreen('loadingScreen');
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('topTitle').textContent = 'Analyzing...';

  const msgs = ['Reading your draft...', 'Detecting tone signals...', 'Identifying trigger words...', 'Generating rewrites...'];
  let mi = 0;
  const lt = document.getElementById('loadingText');
  const interval = setInterval(() => { mi = (mi+1)%msgs.length; lt.textContent = msgs[mi]; }, 900);

  const prompt = `You are Linea, a forensic message analyst. Analyze this message draft and return ONLY a JSON object with no markdown.

Draft: "${draft}"
Situation: "${situation}"
Desired tone: "${selectedTone}"

Return exactly this JSON structure:
{
  "toneLabels": ["label1", "label2"],
  "triggerWords": ["word1", "word2"],
  "analysis": "2-3 sentence forensic breakdown of how this message will be perceived",
  "rewrites": {
    "softer": "rewritten softer version",
    "clearer": "rewritten clearer version",
    "firmer": "rewritten firmer version"
  }
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    clearInterval(interval);
    let text = data.content.map(i => i.text||'').join('');
    text = text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(text);
    showAnalysis(draft, parsed);
  } catch(e) {
    clearInterval(interval);
    showAnalysisFallback(draft);
  }
}

function showAnalysis(draft, d) {
  const html = `
    <div class="bubble-wrap"><div class="original-bubble">${draft}</div></div>
    <div class="section-head"><span class="dot dot-amber"></span> Tone breakdown</div>
    <div class="analysis-card">
      <div style="margin-bottom:8px">${(d.toneLabels||[]).map(l=>`<span class="trigger-tag" style="background:#E6F1FB;color:#185FA5">${l}</span>`).join('')}</div>
      ${(d.triggerWords||[]).map(w=>`<span class="trigger-tag">trigger: "${w}"</span>`).join('')}
      <div style="margin-top:10px">${d.analysis||''}</div>
    </div>
    <div class="section-head" style="margin-top:16px"><span class="dot dot-green"></span> Rewrites</div>
    ${rewriteCard('softer','SOFTER',d.rewrites?.softer||'')}
    ${rewriteCard('clearer','CLEARER',d.rewrites?.clearer||'')}
    ${rewriteCard('firmer','FIRMER',d.rewrites?.firmer||'')}
  `;
  document.getElementById('analysisContent').innerHTML = html;
  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.onclick = () => { const t = btn.dataset.text; navigator.clipboard?.writeText(t); btn.textContent = 'Copied!'; setTimeout(()=>btn.textContent='Use this',1500); };
  });
  document.getElementById('backBtn').style.display = 'block';
  document.getElementById('topTitle').textContent = 'Analysis';
  showScreen('analysisScreen');
}

function rewriteCard(cls, label, text) {
  return `<div class="rewrite-card"><div class="rewrite-label ${cls}">${label}</div><div class="rewrite-body">${text}</div><button class="copy-btn" data-text="${text.replace(/"/g,'&quot;')}">Use this</button></div>`;
}

function showAnalysisFallback(draft) {
  showAnalysis(draft, {
    toneLabels: ['Cold distance','Accusatory'],
    triggerWords: ['never','don\'t trust'],
    analysis: 'This message may read as accusatory. The word "never" can feel like a broad attack, making the other person defensive before they can respond. The phrase "don\'t trust me" frames it as a verdict rather than a feeling.',
    rewrites: {
      softer: 'Hey, I felt a little out of the loop hearing this from someone else. I just want us to be able to share stuff like that 💙',
      clearer: 'Can I ask why you didn\'t tell me? I\'m not upset, just want to understand.',
      firmer: 'I need to be honest — it hurt finding out this way. I\'d like us to be more open with each other.'
    }
  });
}
</script>
